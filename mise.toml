# Reproducible toolchain for runite.
# Install everything with `mise install`, then use `mise run <task>`.
#
# Reproducibility model: the version specs below are intentionally loose
# (track stable). Exact resolved versions + checksums are pinned in `mise.lock`
# (committed), so `mise install` is fully reproducible. To intentionally update
# the toolchain, run `mise upgrade` (bumps within the spec) followed by
# `mise lock`, then commit the refreshed `mise.lock`.

[settings]
# Pin exact versions + checksums in mise.lock instead of hard-coding them here.
lockfile = true

[tools]
# Track stable Rust 1.x; `mise.lock` pins the exact patch release. runite is
# stable-Rust clean. The MSRV is 1.88 (declared in Cargo.toml): edition 2024
# needs >= 1.85, and the crate also uses `let`-chains, stabilized in 1.88.
# Components are declared explicitly so a fresh `mise install` (e.g. CI) gets
# rustfmt + clippy and the llvm-tools that cargo-llvm-cov needs — mise's rust
# backend installs a minimal profile otherwise.
rust = { version = "1", components = "rustfmt,clippy,llvm-tools" }

# Agent Cop static-analysis tool, installed from GitHub release binaries; the
# exact release is pinned in `mise.lock`. https://github.com/KrzysztofCwalina/cop
"github:KrzysztofCwalina/cop" = { version = "latest", exe = "cop" }

# `cargo public-api` powers `mise run api-report`, which renders the crate's
# public surface as reviewable markdown (docs/public-api.md). It shells out to a
# nightly rustdoc to emit rustdoc JSON, so the report is a local/dev tool rather
# than part of the `check` gate.
"cargo:cargo-public-api" = "0.52.0"

[tasks.build]
description = "Build the workspace"
run = "cargo build --workspace --all-targets"

[tasks.test]
description = "Run all tests including doctests"
run = "cargo test --workspace --all-features"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all --check"

[tasks.lint]
description = "Run clippy with warnings denied"
run = "cargo clippy --workspace --all-targets --all-features -- -D warnings"

[tasks.doc]
description = "Build documentation"
run = "cargo doc --workspace --all-features --no-deps"

[tasks.api-report]
description = "Render the public API surface to docs/public-api.md for review"
run = "cargo run --quiet --package xtask -- api-report"

[tasks.api-report-check]
description = "Fail if docs/public-api.md is stale (regenerate with api-report)"
run = "cargo run --quiet --package xtask -- api-report --check"

[tasks.examples]
description = "Smoke-run every example to completion (the interactive ones via --demo)"
# mise runs tasks with `sh` by default; dash rejects `pipefail`, so pin bash.
shell = "bash -c"
run = """
set -euo pipefail
for ex in background_workers frame_loop_embedding build_pipeline \
          runtime_loop_showcase channel_showcase broadcast_watch async_fs_showcase \
          tcp_echo_server subprocess_pipeline main_result; do
  echo "== example: $ex"
  cargo run --quiet --example "$ex" >/dev/null
done
echo "== example: command_center --demo"
cargo run --quiet --example command_center -- --demo >/dev/null
echo "== example: chat_server --demo"
cargo run --quiet --example chat_server -- --demo >/dev/null
echo "== example: hyper_http_client (hyper feature)"
cargo run --quiet --example hyper_http_client --features hyper >/dev/null
echo "all examples ran to completion"
"""

[tasks.bench]
description = "Run criterion benchmarks (runtime + I/O)"
run = "cargo bench --workspace --all-features"

[tasks.coverage]
description = "Generate an HTML + lcov coverage report with cargo-llvm-cov"
run = [
  "cargo llvm-cov --workspace --all-features --ignore-filename-regex '(^|/)(xtask|proc_macros)/' --lcov --output-path lcov.info",
  "cargo llvm-cov report --html --ignore-filename-regex '(^|/)(xtask|proc_macros)/'",
]

[tasks.coverage-ci]
description = "Emit lcov coverage for CI consumption"
run = "cargo llvm-cov --workspace --all-features --ignore-filename-regex '(^|/)(xtask|proc_macros)/' --lcov --output-path lcov.info"

[tasks.cop]
description = "Run Agent Cop static-analysis checks"
run = "cop cop-checks/main.cop -t ."

[tasks.cop-verify]
description = "Verify cop rule files compile"
run = "cop verify cop-checks/"

[tasks.check]
description = "Run the full local gate (fmt, lint, test, cop)"
depends = ["fmt", "lint", "test", "cop"]
