name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Lets mise's github backend fetch the cop release and verify attestations
  # without hitting unauthenticated GitHub API rate limits.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: Lint & docs (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      # mise's rust backend delegates to rustup, whose toolchain lives outside the
      # cached mise dir. On a mise cache hit the component install is skipped and
      # rustup auto-installs a minimal toolchain (no rustfmt/clippy), so install the
      # required components explicitly and idempotently against the pinned toolchain.
      - name: Ensure rust components
        run: mise exec -- bash -c 'rustup toolchain install "$RUSTUP_TOOLCHAIN" -c rustfmt -c clippy -c llvm-tools --no-self-update'
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      # Run the checks first: `cop <file> -t .` auto-restores the imported
      # packages (code, code-analysis, rust) from the default feed into a fresh
      # runner's package cache. `cop verify` does NOT auto-restore, so it must
      # run after the cache is warmed, otherwise it fails with
      # "Package not found in any feed" on a clean CI machine.
      # cop is an experimental external analyzer whose `rust` provider can be
      # auto-updated to a version the pinned cop binary cannot load. Keep these
      # steps advisory (non-blocking) so upstream tooling churn never reds CI.
      - name: Cop checks
        continue-on-error: true
        run: cop cop-checks/main.cop -t .
      - name: Cop verify
        continue-on-error: true
        run: cop verify cop-checks/

  test-linux:
    name: Test (Linux x86_64, io_uring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features

  test-linux-arm64:
    name: Test (Linux aarch64, io_uring)
    # Native arm64 runner (free for public repos) so the io_uring backend is
    # exercised on a real aarch64 kernel rather than under emulation.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --all-targets --all-features
      - name: Test
        run: cargo test --workspace --all-features

  test-macos:
    name: Test (macOS aarch64, kqueue)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Ensure rust components
        run: mise exec -- bash -c 'rustup toolchain install "$RUSTUP_TOOLCHAIN" -c clippy --no-self-update'
      - name: Build
        run: cargo build --workspace --all-targets --all-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Verify the crate honors its declared `rust-version` (Cargo.toml). Pin the
      # exact MSRV floor rather than mise's tracking-stable toolchain so a newly
      # used language/library feature that raises the real MSRV fails here instead
      # of silently invalidating the published `rust-version`.
      - name: Install Rust 1.88.0
        run: rustup toolchain install 1.88.0 --profile minimal --no-self-update
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check on MSRV
        run: cargo +1.88.0 check --workspace --all-features

  deny:
    name: Licenses & advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  coverage:
    name: Code coverage (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      # cargo-llvm-cov needs the llvm-tools component; install it explicitly because
      # a mise cache hit skips mise's own component install (see the lint job).
      - name: Ensure rust components
        run: mise exec -- bash -c 'rustup toolchain install "$RUSTUP_TOOLCHAIN" -c llvm-tools --no-self-update'
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: cargo llvm-cov --workspace --all-features --ignore-filename-regex '(^|/)(xtask|proc_macros)/' --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info

  benches:
    name: Benchmarks (compile + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Build benches
        run: cargo build --benches --all-features
      - name: Smoke-run benches
        run: cargo bench --bench runtime -- --warm-up-time 0.1 --measurement-time 0.3 --sample-size 10

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain via mise
        uses: jdx/mise-action@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      # Only the proc-macro crate can be dry-run before the first release: it has
      # no path dependencies. The umbrella `runite` crate depends on
      # runite-proc-macros by path+version and cannot be packaged until that crate
      # exists on crates.io, so it is verified during the release workflow instead.
      - name: Dry-run runite-proc-macros
        run: cargo publish --dry-run -p runite-proc-macros
